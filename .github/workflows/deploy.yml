name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# VULN: excessive-workflow-permissions — "write-all" grants this workflow
# write access to every GitHub API scope (contents, packages, issues,
# deployments, etc.) instead of the single "pages: write" scope it actually
# needs. A compromised action/dependency in this run inherits all of it.
permissions: write-all

# VULN: hardcoded-secret-in-workflow — a third-party deploy token is pasted
# here in plaintext instead of using a repo secret (`${{ secrets.* }}`).
# Anyone with read access to this repo (or its Actions logs) gets a live
# credential. Left unused by the actual deploy step below on purpose, so the
# pipeline still runs green while the secret sits in the committed YAML for
# Aikido's scanner to find.
env:
  LEGACY_DEPLOY_TOKEN: "ghp_DEMOFAKEPAT1234567890abcdefGHIJKL"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

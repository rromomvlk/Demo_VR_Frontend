# .github/workflows/veracode-policy-scan.yml
# Escaneo SAST completo (Veracode Upload and Scan / Policy Scan) al integrar a main.
# Empaqueta con la Veracode CLI (JS/TS y Python) y sube al perfil de la app.

name: Veracode Policy Scan (main)

on:
  push:
    branches: [ "main" ]
  # Opcional: también corre cada noche a las 02:00 UTC.
  schedule:
    - cron: "0 2 * * *"

jobs:
  veracode-policy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # 1) Instala la CLI oficial de Veracode.
      - name: Instalar Veracode CLI
        run: curl -fsS https://tools.veracode.com/veracode-cli/install | sh

      # 2) Empaqueta la app (JS/TS y Python) en ./verascan.
      - name: Empaquetar aplicación (auto-packaging)
        run: ./veracode package --source . --output verascan --trust

      # 3) Sube el/los artefacto(s) y ejecuta el Policy Scan.
      - name: Veracode Upload and Scan
        uses: veracode/veracode-uploadandscan-action@0.2.9 
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          # Debe coincidir EXACTO con el nombre del perfil en la plataforma.
          appname: "Demo_VR_Frontend"
          version: "${{ github.run_id }}-${{ github.sha }}"
          # Carpeta con los artefactos empaquetados por la CLI.
          filepath: "verascan"
          # El perfil ya lo creaste manualmente, así que no lo recrees.
          createprofile: false
          scantimeout: 30

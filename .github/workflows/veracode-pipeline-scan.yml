# .github/workflows/veracode-pipeline-scan.yml
# Escaneo SAST rápido (Veracode Pipeline Scan) en cada Pull Request.
# Empaqueta con la Veracode CLI (soporta JS/TS y Python) y luego escanea.

name: Veracode Pipeline Scan (PR)

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: veracode-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  veracode-pipeline-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # 1) Instala la CLI oficial de Veracode (incluye el auto-packager).
      - name: Instalar Veracode CLI
        run: curl -fsS https://tools.veracode.com/veracode-cli/install | sh

      # 2) Empaqueta la app. El auto-packager detecta JS/TS y Python.
      #    Deja los artefactos en ./verascan y expone la ruta del .zip.
      - name: Empaquetar aplicación (auto-packaging)
        id: package
        run: |
          ./veracode package --source . --output verascan --trust
          echo "artifact=$(ls verascan/*.zip | head -n 1)" >> "$GITHUB_OUTPUT"

      # 3) Ejecuta el Pipeline Scan sobre el artefacto generado.
      - name: Veracode Pipeline Scan
        uses: veracode/Veracode-pipeline-scan-action@v1.0.20
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          file: ${{ steps.package.outputs.artifact }}
          # Falla el build solo con severidad alta para empezar.
          fail_build: true
          fail_on_severity: "Very High, High"

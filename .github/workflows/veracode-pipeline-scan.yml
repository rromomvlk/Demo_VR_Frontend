# .github/workflows/veracode-pipeline-scan.yml
# Escaneo SAST rápido (Veracode Pipeline Scan) en cada Pull Request.
# Da feedback inmediato al desarrollador sin frenar el flujo.

name: Veracode Pipeline Scan (PR)

on:
  pull_request:
    branches: [ "main" ]

# Cancela ejecuciones anteriores del mismo PR si se hace un nuevo push
concurrency:
  group: veracode-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  veracode-pipeline-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # 1) Empaqueta la app en el artefacto que Veracode espera.
      #    El auto-packager detecta JS/TS y Python automáticamente.
      - name: Empaquetar aplicación (Veracode auto-packager)
        uses: veracode/veracode-package@v1
        with:
          source: "."
          output: "veracode-artifact"
          # Genera uno o varios archivos dentro de ./veracode-artifact

      # 2) Ejecuta el Pipeline Scan sobre el artefacto empaquetado.
      - name: Veracode Pipeline Scan
        uses: veracode/Veracode-pipeline-scan-action@v1.0.16
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          # Ajusta la ruta al archivo generado por el packager si es necesario.
          file: "veracode-artifact/veracode-auto-pack-${{ github.event.repository.name }}.zip"
          # Falla el job solo con hallazgos de severidad alta para empezar.
          # Sube el nivel (p. ej. a "Medium") cuando el equipo esté listo.
          fail_build: true
          fail_on_severity: "Very High, High"
